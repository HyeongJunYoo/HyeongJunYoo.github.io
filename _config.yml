about_content: |
  **경력** 약 2년 6개월 · Unity/C# 기반 **클라이언트 엔지니어링**에 집중해 왔습니다. 메타버스 플랫폼의 PC·VR 제품화부터 Android·iOS 마이그레이션, **UPM 패키지 형태의 플랫폼 SDK** 설계·배포, **Lua** 기반 콘텐츠 확장, OpenXR·XR Interaction Toolkit·Netcode·Meta Horizon 비공개 배포 등 실서비스에 가까운 경험을 쌓았습니다.

  **핵심 역량**
  - Unity(C#) 메타버스 플랫폼 및 교육용 VR 콘텐츠 개발
  - iOS/Android 마이그레이션, 비공개 배포 및 빌드 파이프라인(Gradle, Xcode 등) 정비
  - Addressables 기반 에셋 그룹·런타임 로딩·콘텐츠 배포·갱신 구조
  - 모션캡처 연동(Face·풀바디) 및 플랫폼·콘텐츠 파이프라인에 적용
  - 플랫폼 SDK·AI Toolkit 설계로 콘텐츠 제작 환경 구축

  **스킬** C#, Unity, VR, URP, IL2CPP, Addressables, Lua, OpenXR, Git

content:
  - title: 경력
    layout: list
    content:
      - layout: right
        border: weak
        title: 트웬티온스
        sub_title: 연구개발팀 · 전임 개발자
        caption: 2023.09 - 현재
        quote: >
          메타버스 플랫폼 개발·배포·운영, SDK·모바일·콘텐츠·AI Toolkit·모션캡처 연동
        description: |
          - Unity 기반 메타버스 플랫폼 개발, PC·VR 지원, URP·IL2CPP 빌드 환경 구축 및 운영
          - 출시·업데이트 배포 프로세스, 빌드·버전 관리, 운영 이슈·호환성 대응
          - 상세 구현·성과는 아래 **주요 프로젝트** 항목에 정리
      - layout: right
        title: 트웬티온스
        sub_title: 연구개발팀 · 인턴
        caption: 2023.03 - 2023.08
        quote: >
          Unity 기반 물리 드론 시뮬레이션
        description: |
          - PID Controller를 적용한 물리 기반 드론 시뮬레이션 프로젝트 개발
          - C#, Unity 물리 엔진, 제어 이론을 활용한 시뮬레이션 구현

  - title: 주요 프로젝트
    layout: list
    content:
      - layout: left
        border: weak
        title: 메타버스 플랫폼 (PC·VR)
        quote: >
          URP·IL2CPP, 실서비스 빌드·운영
        description: |
          - PC·VR 타깃 Unity 클라이언트 개발 및 런타임 운영
          - **Addressables** 기반 오브젝트·아바타·맵 등 에셋 그룹 구성, 런타임 로딩 및 콘텐츠 배포·갱신 구조 설계
          - 모션캡처 연동으로 Face·풀바디 트래킹을 아바타·인터랙션에 활용
          - OpenXR, XR Interaction Toolkit, Netcode 활용 및 Meta Horizon 앱 비공개 배포 경험
      - layout: left
        border: weak
        title: 플랫폼 SDK (UPM·Lua)
        quote: >
          콘텐츠 제작 환경을 위한 패키지 설계·배포
        description: |
          - 플랫폼 SDK 설계·개발, **GitHub 기반 UPM(Unity Package Manager)** 패키지 배포·버전 관리
          - **Lua** 스크립팅으로 콘텐츠·플랫폼 기능 확장이 가능하도록 SDK에 연동
      - layout: left
        border: weak
        title: 메타버스 플랫폼 모바일 (Android·iOS)
        quote: >
          마이그레이션, 빌드 파이프라인, 런타임 최적화
        description: |
          - 기존 플랫폼을 Android·iOS로 마이그레이션, Gradle·Xcode 등 모바일 빌드·배포 파이프라인 정비
          - 기기 성능·메모리·발열·배터리 제약을 고려한 렌더링·리소스·로딩 최적화
          - 터치 입력·해상도·세이프 에리어 등 모바일 UI/UX 조정
      - layout: left
        border: weak
        title: 메타버스 콘텐츠 (3종 이상)
        quote: >
          Lua·SDK 기반 제작·운영
        description: |
          - **심리상담**: 메타버스 공간에서 상담·간단한 놀이 요소를 포함한 콘텐츠
          - **VR 요리**: 2인 협동, 레시피·아이템 해금 구조의 요리 게임형 콘텐츠
          - **프로그래밍 강의**: 수강·문제 풀이·학습이 가능한 교육 콘텐츠
      - layout: left
        border: weak
        title: 메타버스 플랫폼 AI Toolkit
        quote: >
          Skill.md 집합체 형태, 플랫폼 SDK 연계
        description: |
          - Skill.md 파일 집합체 형태로 설계·구현, SDK와 연계해 AI를 활용한 콘텐츠 개발 지원
      - layout: left
        border: weak
        title: 마커리스 실시간 모션캡처 앱
        quote: >
          Face·Full Body → 메타버스·콘텐츠 파이프라인 연동
        description: |
          - **iOS**: LiDAR·ARKit 기반 바디·페이스 트래킹
          - **Android**: MediaPipe 기반 풀바디 트래킹
      - layout: left
        title: 교육용 VR 침술 시뮬레이터
        quote: >
          VR·PC·실시간 멀티플레이어, 400+ 혈자리 DB
        description: |
          - 가상 환자 대상 문진~시술 전 과정, 혈자리·각도·깊이 학습
          - 학습·실습·참관 모드, TTS 문진·진료차트·XR 시술·결과 평가(직자/사자·정확도 등)
          - 400개 이상 혈자리 DB·실시간 각도·깊이 피드백, 네트워크 동기화·참관, 가이드·해부 정보·진료 리포트

  - title: 학력
    layout: list
    content:
      - layout: top-right
        title: 강남대학교
        sub_title: 소프트웨어응용학부 학사 · 가상현실전공 / 소프트웨어전공
        caption: 2020.03 - 2024.02
        quote: >
          학점 4.2 / 4.5 (차석 졸업)
        description: |
          소프트웨어·가상현실 전공 이수
      - layout: top-right
        title: 강남대학교 CGVR@KNU 연구팀
        sub_title: 학부연구원
        caption: 2022.01 - 2023.01
        quote: >
          입자 기반 페인트 시뮬레이션
        description: |
          - VR에서 물감의 물리적 특성을 효율적으로 표현하는 입자 기반 프레임워크 연구·개발
          - 2023 한국컴퓨터정보학회 동계학술대회 논문 발표
          - C++, OpenGL, Fluid Simulation

footer_show_references: true

remote_theme: sproogen/modern-resume-theme

sass:
  sass_dir: _sass
  style: compressed

